name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check formatting with black
        run: black --check bot/ ai_service/ || echo "Formatting issues found, please run black on your code."

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 bot/ ai_service/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings.
          flake8 bot/ ai_service/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare environment variables
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "TELEGRAM_TOKEN=mock_token" > .env
          fi

      - name: Build Docker images
        run: docker compose build

      - name: Run Test Suite inside Docker
        run: docker compose run --rm bot python test_handlers.py
