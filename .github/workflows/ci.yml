name: CI Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d # v5.1.0
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Check formatting with black
        run: black --check bot/ ai_service/

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 bot/ ai_service/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # fail on any other issues, ignoring code complexity (C901)
          flake8 bot/ ai_service/ --count --max-line-length=127 --ignore=C901 --statistics

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Prepare environment variables
        run: |
          echo "TELEGRAM_TOKEN=mock_telegram_token" > .env
          echo "HF_TOKEN=mock_hf_token" >> .env
          echo "USE_GPU=false" >> .env
          echo "GEMINI_API_KEY=mock_gemini_key" >> .env
          echo "GEMINI_MODEL=gemini-3.1-flash-lite" >> .env

      - name: Build Docker images
        run: docker compose build

      - name: Run Test Suite inside Docker
        run: docker compose run --rm --no-deps bot python test_handlers.py
